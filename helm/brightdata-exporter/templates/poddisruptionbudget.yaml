{{- /*
  PodDisruptionBudget — protects against involuntary disruption (node
  drain, eviction). For a single-replica deployment this is a real
  trade-off:

    - With a PDB and minAvailable=1: cluster admins CANNOT drain the
      node hosting this pod for routine maintenance — the chart
      becomes the blocker. That's the point if you want strict
      uptime; it's an anti-pattern if you don't.

    - Without a PDB (default): drains succeed instantly, the pod
      reschedules to another node within ~10-60s, and there's a
      brief window of unavailability.

  Most users want the default (no PDB) — uptime gap during a planned
  drain is short, and not blocking maintenance is the responsible
  cluster-citizen behavior. Set podDisruptionBudget.enabled=true only
  when the unavailability window genuinely matters more than letting
  cluster admins drain freely.
*/ -}}
{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "brightdata-exporter.fullname" . }}
  labels:
    {{- include "brightdata-exporter.labels" . | nindent 4 }}
spec:
  {{- if .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- else if .Values.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- else }}
  minAvailable: 1
  {{- end }}
  selector:
    matchLabels:
      {{- include "brightdata-exporter.selectorLabels" . | nindent 6 }}
{{- end }}
