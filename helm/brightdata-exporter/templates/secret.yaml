{{- /*
  Chart-managed Secret — only rendered when auth.apiToken is provided
  inline. When auth.existingSecret is set instead, the chart consumes that
  pre-existing Secret (e.g. one written by ExternalSecret operator) and
  this template is skipped.

  The same Secret carries the optional BRIGHTDATA_API_AUTH_TOKEN (bearer
  for /api/*) when auth.apiAuthToken is provided inline AND no separate
  existingAuthSecret is configured. Both keys live together because they
  share the same operational concern (rotating credentials for one
  exporter instance).
*/ -}}
{{- if and (not .Values.auth.existingSecret) (or .Values.auth.apiToken .Values.auth.apiAuthToken) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "brightdata-exporter.fullname" . }}
  labels:
    {{- include "brightdata-exporter.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.auth.apiToken }}
  BRIGHTDATA_API_TOKEN: {{ .Values.auth.apiToken | quote }}
  {{- end }}
  {{- if and .Values.auth.apiAuthToken (not .Values.auth.existingAuthSecret) }}
  BRIGHTDATA_API_AUTH_TOKEN: {{ .Values.auth.apiAuthToken | quote }}
  {{- end }}
{{- end }}
