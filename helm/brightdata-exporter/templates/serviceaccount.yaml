{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "brightdata-exporter.serviceAccountName" . }}
  labels:
    {{- include "brightdata-exporter.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# `automountServiceAccountToken` set both here AND on the pod spec is
# the belt-and-suspenders pattern: the SA-level setting acts as the
# default for any pod consuming this SA, the pod-level setting is what
# wins for our specific pod. Keeping them aligned reduces surprise.
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken | default false }}
{{- end }}
