apiVersion: v2
name: brightdata-exporter
description: |
  Bright Data observability + FinOps service. Single binary, two interfaces:

    - Prometheus exporter on /metrics — account balance, per-zone cost /
      traffic / request totals over a fixed rolling window. Drives alerts
      and time-series trends via Mimir / Thanos / VictoriaMetrics.
    - REST service on /api/account, /api/zones?from=&to= — on-demand JSON
      with the from/to range driven by the dashboard time picker. Pairs
      with Grafana's Infinity datasource so users pick "last 7 days",
      "MTD", or any custom range and the numbers reflect THAT range.

  Two complementary Grafana dashboards ship in examples/: a FinOps
  investigation dashboard (Infinity, picker-driven) and an Operations
  dashboard (Prometheus, continuous monitoring).
type: application
version: 0.2.15
appVersion: "0.2.15"
keywords:
  - brightdata
  - prometheus
  - exporter
  - rest-api
  - finops
  - observability
  - proxy
  - monitoring
  - grafana
home: https://github.com/danielgines/brightdata-exporter
sources:
  - https://github.com/danielgines/brightdata-exporter
maintainers:
  - name: Daniel Gines
    url: https://github.com/danielgines
# `icon:` intentionally omitted — ArtifactHub rejects .ico files (only
# accepts PNG/JPG/SVG/WebP). To add a logo later, host a PNG/SVG at a
# public URL (e.g. raw.githubusercontent.com) and add it back here.

# ArtifactHub-specific annotations. ArtifactHub picks these up during
# scrape and uses them for category filtering, license detection, the
# Containers Images tab (CVE scan integration), Quick links, and the
# per-version Changelog tab. Equivalent to a separate artifacthub-pkg.yml
# but kept inline so Chart.yaml stays the single source of truth.
# `artifacthub.io/images` references the exact version tag of the
# container image this chart deploys — kept in sync with Chart.version
# by scripts/sync-version.py so it never drifts.
annotations:
  artifacthub.io/category: monitoring-logging
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: source
      url: https://github.com/danielgines/brightdata-exporter
    - name: container image (GHCR)
      url: https://github.com/danielgines/brightdata-exporter/pkgs/container/brightdata-exporter
    - name: changelog
      url: https://github.com/danielgines/brightdata-exporter/blob/main/CHANGELOG.md
  artifacthub.io/images: |
    - name: brightdata-exporter
      image: ghcr.io/danielgines/brightdata-exporter:0.2.15
  artifacthub.io/changes: |
    - kind: added
      description: ArtifactHub category, license, images, links annotations on Chart.yaml
    - kind: added
      description: PodDisruptionBudget template (opt-in, default disabled) — see values.yaml
    - kind: added
      description: automountServiceAccountToken=false default — exporter never calls k8s API, zero-trust default
    - kind: added
      description: terminationGracePeriodSeconds explicit (default 30) + configurable
    - kind: added
      description: priorityClassName opt-in via values.yaml for production scheduling
    - kind: fixed
      description: OCI label org.opencontainers.image.version was being set to 0.2 (semver minor pattern) instead of full version — now explicit
    - kind: changed
      description: setup-uv CI action bumped 3 → 7 (#3)
